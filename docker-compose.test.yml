# Docker Compose file for local testing
# Usage: docker compose -f docker-compose.test.yml up -d
#
# After startup, verify extensions:
#   docker exec frl-timescale-test psql -U postgres -d test_rag -c \
#     "CREATE EXTENSION IF NOT EXISTS timescaledb; CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm; CREATE EXTENSION IF NOT EXISTS pg_search; \dx"

services:
  timescale-test:
    image: frl-cloudnativepg-timescale:17-test
    container_name: frl-timescale-test
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_USER: postgres
      POSTGRES_DB: test_rag
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb
      - -c
      - timescaledb.telemetry_level=off
    ports:
      - "5433:5432"
    volumes:
      - timescale-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale-test-data:

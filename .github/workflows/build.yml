name: Build and Push Images

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'build.sh'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
  schedule:
    # Rebuild every Monday at 00:00 UTC to get latest security patches
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      pg_version:
        description: 'PostgreSQL version (15, 16, 17, or all)'
        required: false
        default: 'all'
      push:
        description: 'Push to registry'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        pg_version: ['15', '16', '17']
        include:
          - pg_version: '15'
            cnpg_tag: '15.10-bookworm'
          - pg_version: '16'
            cnpg_tag: '16.6-bookworm'
          - pg_version: '17'
            cnpg_tag: '17.2-bookworm'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.pg_version }}
            type=raw,value=${{ matrix.pg_version }}-{{date 'YYYYMMDD'}}
            type=sha,prefix=${{ matrix.pg_version }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CNPG_TAG=${{ matrix.cnpg_tag }}
            POSTGRES_VERSION=${{ matrix.pg_version }}
            PGVECTOR_VERSION=0.8.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        if: github.event_name == 'pull_request'
        run: |
          # Build the image locally for testing
          docker build \
            --build-arg CNPG_TAG=${{ matrix.cnpg_tag }} \
            --build-arg POSTGRES_VERSION=${{ matrix.pg_version }} \
            --build-arg PGVECTOR_VERSION=0.8.0 \
            --tag test-image:${{ matrix.pg_version }} \
            .

          # Start a container
          docker run -d \
            --name test-pg-${{ matrix.pg_version }} \
            -e POSTGRES_PASSWORD=testpass \
            test-image:${{ matrix.pg_version }}

          # Wait for PostgreSQL to start
          sleep 10

          # Check that extensions are available
          docker exec test-pg-${{ matrix.pg_version }} psql -U postgres -c "SELECT * FROM pg_available_extensions WHERE name IN ('timescaledb', 'vector', 'pg_trgm');"

          # Clean up
          docker stop test-pg-${{ matrix.pg_version }}
          docker rm test-pg-${{ matrix.pg_version }}

  # Create multi-arch manifest (optional, for future ARM support)
  # manifest:
